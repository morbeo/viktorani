name: CI

on:
  pull_request:
    branches: [master]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-title:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install commitlint
        run: npm install --no-save @commitlint/cli @commitlint/config-conventional

      - name: Lint PR title
        run: echo "${{ github.event.pull_request.title }}" | npx --yes commitlint

  detect:
      runs-on: ubuntu-latest
      outputs:
        code: ${{ steps.changes.outputs.code }}
      steps:
        - uses: actions/checkout@v6

        - name: Detect code changes
          id: changes
          run: bash scripts/detect-code-changes.sh "${{ github.event.pull_request.base.sha }}"

  ci:
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.code == 'true'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Coverage summary
        run: bash scripts/coverage-summary.sh

      - name: Build
        run: npm run build

      - name: Check bundle size
        run: npm run check:size
