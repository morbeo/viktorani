name: Publish

on:
  pull_request:
    types: [closed]
    branches: [master]

concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  tag-and-release:
    # Only run when a release PR is merged (not just closed)
    if: |
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'chore/release-')

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - name: Extract version from package.json
        id: version
        run: |
          VERSION="v$(node -p "require('./package.json').version")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Configure git
        run: |
          git config user.name "Vladimir Kirov"
          git config user.email "morbeo@gmail.com"

      - name: Create and push tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Create GitHub Release
        run: |
          NOTES=$(npx git-cliff --tag ${{ steps.version.outputs.version }} --unreleased --strip all)
          gh release create ${{ steps.version.outputs.version }} \
            --title "${{ steps.version.outputs.version }}" \
            --notes "$NOTES"
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Trigger deploy
        run: |
          gh workflow run deploy.yml --ref master
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
