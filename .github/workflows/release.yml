name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # RELEASE_PAT is a fine-grained PAT with contents:write and pull-requests:write.
          # Using GITHUB_TOKEN here is blocked by GitHub's "Actions cannot approve PRs" policy.
          # Setup: GitHub → Settings → Developer settings → Personal access tokens → Fine-grained
          # Permissions needed: Contents (read+write), Pull requests (read+write)
          # Then: repo Settings → Secrets → Actions → New secret named RELEASE_PAT
          token: ${{ secrets.RELEASE_PAT }}

      - name: Release
        uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PAT }}

      - name: Summarise
        if: ${{ steps.release.outputs.release_created }}
        run: |
          echo "### Released v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[${{ steps.release.outputs.tag_name }}](${{ steps.release.outputs.html_url }})" >> $GITHUB_STEP_SUMMARY
