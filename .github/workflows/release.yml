name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
      prerelease:
        description: "Pre-release"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Lint, typecheck, test
        run: |
          npm run lint
          npm run typecheck
          npm run test

      - name: Configure git
        run: |
          git config user.name "Vladimir Kirov"
          git config user.email "morbeo@gmail.com"

      - name: Bump version
        id: bump
        run: |
          VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: npx git-cliff --tag ${{ steps.bump.outputs.version }} -o CHANGELOG.md

      - name: Commit, tag, push
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.bump.outputs.version }}"
          git tag ${{ steps.bump.outputs.version }}
          git push origin master --follow-tags

      - name: Create GitHub Release
        uses: actions/create-release@latest
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          release_name: ${{ steps.bump.outputs.version }}
          body: ${{ steps.changelog.outputs.content }}
          prerelease: ${{ inputs.prerelease == 'true' }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Trigger deploy
        run: gh workflow run deploy.yml --ref master
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
