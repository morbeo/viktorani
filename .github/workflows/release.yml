run-name: "Release ${{ inputs.bump }} by ${{ github.actor }}"

name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]
      prerelease:
        description: "Pre-release"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      deploy:
        description: "Trigger deploy after release"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --legacy-peer-deps

      - name: Lint, typecheck, test
        run: |
          npm run lint
          npm run typecheck
          npm run test

      - name: Configure git
        run: |
          git config user.name "Vladimir Kirov"
          git config user.email "morbeo@gmail.com"

      - name: Bump version
        id: bump
        run: |
          VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Release $VERSION ${{ inputs.bump }} by ${{ github.actor }}" >> "$GITHUB_RUN_NAME"

      - name: Generate changelog
        id: changelog
        run: |
          npx git-cliff --tag ${{ steps.bump.outputs.version }} -o CHANGELOG.md
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          npx git-cliff --latest --strip all >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Commit, tag, push
        run: |
          git add package.json package-lock.json CHANGELOG.md
          git commit -m "chore(release): ${{ steps.bump.outputs.version }}"
          git tag ${{ steps.bump.outputs.version }}
          git push origin master --follow-tags

      - name: Create GitHub Release
        run: |
          gh release create ${{ steps.bump.outputs.version }} \
            --title "${{ steps.bump.outputs.version }}" \
            --notes "${{ steps.changelog.outputs.notes }}" 
            ${{ inputs.prerelease == 'true' && '--prerelease' || '' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}

      - name: Trigger deploy
        if: inputs.deploy == 'true'
        run: gh workflow run deploy.yml --ref master
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
