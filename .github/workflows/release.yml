name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options: [patch, minor, major]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_PAT }}

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci --legacy-peer-deps

      - name: Configure git
        run: |
          git config user.name "Vladimir Kirov"
          git config user.email "morbeo@gmail.com"

      - name: Bump version and generate changelog
        run: |
          VERSION=$(npm version ${{ inputs.bump }} --no-git-tag-version)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          npx git-cliff --tag $VERSION -o CHANGELOG.md
          git add CHANGELOG.md package.json package-lock.json
          git commit -m "chore(release): $VERSION"

      - name: Open PR
        run: |
          BRANCH="chore/release-${VERSION}"
          git checkout -b $BRANCH
          git push origin $BRANCH
          gh pr create \
            --title "chore(release): ${{ env.VERSION }}" \
            --body "Automated release bump for ${{ env.VERSION }}." \
            --base master \
            --head $BRANCH
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
