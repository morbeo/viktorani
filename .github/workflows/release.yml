name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install git-cliff
        run: |
          curl -sSL https://github.com/orhun/git-cliff/releases/latest/download/git-cliff-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz --strip-components=1 -C /usr/local/bin git-cliff-*/git-cliff

      - name: Build tarball
        run: mkdir dist && bash scripts/pack.sh -o dist --name viktorani-${{ github.ref_name }}

      - name: Generate release notes
        run: git cliff --tag ${{ github.ref_name }} --unreleased --strip header > RELEASE_NOTES.md

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            dist/viktorani-${{ github.ref_name }}.tar.gz \
            --title "${{ github.ref_name }}" \
            --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
