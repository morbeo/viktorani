name: Release

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # RELEASE_PAT must be a fine-grained PAT with Contents + Pull requests (read+write).
          # GITHUB_TOKEN cannot create PRs when "Actions cannot approve PRs" policy is active.
          # Setup: Settings → Developer settings → Fine-grained tokens → New token
          # Then: repo Settings → Secrets → Actions → RELEASE_PAT
          token: ${{ secrets.RELEASE_PAT }}

      - name: Release
        uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: node
          token: ${{ secrets.RELEASE_PAT }}

      - name: Summarise
        if: ${{ steps.release.outputs.release_created }}
        run: |
          echo "### Released v${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "[${{ steps.release.outputs.tag_name }}](${{ steps.release.outputs.html_url }})" >> $GITHUB_STEP_SUMMARY
