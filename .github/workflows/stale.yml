name: Stale

on:
  schedule:
    - cron: '0 9 * * 1'   # every Monday at 09:00 UTC
  workflow_dispatch:

permissions:
  issues:        write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: >
            This issue has been open for 30 days with no activity.
            It will be closed in 7 days unless there is new activity.
          stale-pr-message: >
            This PR has been open for 14 days with no activity.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            Closing due to inactivity. Feel free to reopen if still relevant.
          close-pr-message: >
            Closing due to inactivity. Feel free to reopen if still relevant.
          days-before-issue-stale: 30
          days-before-pr-stale:    14
          days-before-close:        7
          stale-issue-label: stale
          stale-pr-label:    stale
          exempt-issue-labels: pinned,security
          exempt-pr-labels:   pinned,security
